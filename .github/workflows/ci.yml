name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Typecheck & Receipt PDF Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Run receipt PDF regression tests
        run: bunx vitest run src/lib/__tests__/receiptPdf.regression.test.ts src/lib/__tests__/receiptPdfCombined.regression.test.ts --reporter=verbose

      - name: Upload receipt PDF regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: receipt-pdf-regression-artifacts
          path: test-artifacts/
          if-no-files-found: ignore
          retention-days: 14
